<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UzarrAI — AI прогнозы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- ========================================= -->
        <!-- ЭКРАН: МАТЧИ -->
        <!-- ========================================= -->
        <div id="screen-matches">
            <div class="header">
                <span class="header-title">⚽ UzarrAI</span>
                <span class="header-user" id="userName">Гость</span>
            </div>
            
            <!-- Фильтр: Лиги -->
            <div class="filter-section">
                <div class="filter-label">Футбол</div>
                <div class="filter-tabs" id="leagueFilters">
                    <button class="filter-btn active" data-filter="all">Все</button>
                    <button class="filter-btn" data-filter="apl">АПЛ</button>
                    <button class="filter-btn" data-filter="seriea">Серия А</button>
                    <button class="filter-btn" data-filter="laliga">Ла Лига</button>
                    <button class="filter-btn" data-filter="bundesliga">Бундес-Лига</button>
                </div>
            </div>
            
            <!-- Фильтр: Время -->
            <div class="filter-section">
                <div class="filter-label">Лайв</div>
                <div class="filter-tabs" id="timeFilters">
                    <button class="filter-btn active" data-filter="all">Все</button>
                    <button class="filter-btn" data-filter="2h">2ч</button>
                    <button class="filter-btn" data-filter="6h">6ч</button>
                    <button class="filter-btn" data-filter="24h">24ч</button>
                </div>
            </div>
            
            <!-- Список матчей -->
            <div id="matchesList">
                <div class="loading">Загрузка матчей<span class="loading-dots"></span></div>
            </div>
        </div>
        
        <!-- ========================================= -->
        <!-- ЭКРАН: РАЗБОР МАТЧА (с тарифами) -->
        <!-- ========================================= -->
        <div id="screen-analysis" class="hidden">
            <button class="back-btn" id="backToMatches">← Назад к матчам</button>
            <div id="analysisContent">
                <div class="loading">Загрузка разбора<span class="loading-dots"></span></div>
            </div>
        </div>
    </div>
    
    <!-- ========================================= -->
    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <!-- ========================================= -->
    <div class="bottom-nav">
        <div class="nav-item active" data-tab="matches">
            <div class="icon">📋</div>
            <div class="label">Матчи</div>
        </div>
        <div class="nav-item" data-tab="analysis">
            <div class="icon">🧠</div>
            <div class="label">Разборы</div>
        </div>
        <div class="nav-item" data-tab="express">
            <div class="icon">⚡</div>
            <div class="label">Экспресс</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
